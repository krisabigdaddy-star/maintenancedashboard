<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SheetJS for Excel Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- Lucide Icons Inline Component ---
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const paths = {
                Upload: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
                Calendar: '<rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>',
                CheckCircle: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
                Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
                AlertCircle: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
                Wrench: '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
                BarChart3: '<path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="10" rx="1"/><rect width="4" height="12" x="15" y="5" rx="1"/>',
                Filter: '<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>',
                FileText: '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>',
                Activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
                Target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
                AlertTriangle: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
                ChevronDown: '<polyline points="6 9 12 15 18 9"/>',
                PieChart: '<path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>',
                TrendingUp: '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',
                Timer: '<line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/>'
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{__html: paths[name]}} />
            );
        };

        // --- Smart Date Parser ---
        const parseDateValue = (rawDate) => {
          if (!rawDate) return '';
          
          if (rawDate instanceof Date) {
            if (rawDate.getFullYear() < 2000) return ''; 
            const year = rawDate.getFullYear();
            const month = String(rawDate.getMonth() + 1).padStart(2, '0');
            const day = String(rawDate.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
          } 
          else if (typeof rawDate === 'number' && rawDate > 10000) {
            const d = new Date((rawDate - 25569) * 86400 * 1000);
            if (d.getFullYear() < 2000) return '';
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
          } 
          else if (typeof rawDate === 'string') {
            let str = rawDate.split(' ')[0].trim();
            let parts = str.includes('/') ? str.split('/') : str.includes('-') ? str.split('-') : null;

            if (parts && parts.length === 3) {
              let y, m, d;
              if (parts[2].length === 4) {
                y = parts[2]; m = parts[1]; d = parts[0]; 
              } else if (parts[0].length === 4) {
                y = parts[0]; m = parts[1]; d = parts[2]; 
              } else {
                y = `20${parts[2]}`; m = parts[1]; d = parts[0]; 
              }
              if (parseInt(y) > 2500) {
                y = (parseInt(y) - 543).toString();
              }
              return `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
            }
            return str.replace(/\//g, '-');
          }
          return String(rawDate);
        };

        // --- Custom MultiSelect Dropdown Component ---
        const MultiSelectDropdown = ({ label, options, selected, onChange, placeholder = "ทั้งหมด (All)", formatOption = (opt) => opt }) => {
          const [isOpen, setIsOpen] = useState(false);
          const isAll = selected.length === 0;

          const toggleOption = (opt) => {
            if (selected.includes(opt)) {
              onChange(selected.filter(x => x !== opt));
            } else {
              onChange([...selected, opt]);
            }
          };

          return (
            <div className="flex flex-col gap-1 w-full relative">
              <label className="text-xs font-semibold text-slate-500 uppercase">{label}</label>
              <div className="relative">
                <button
                  onClick={() => setIsOpen(!isOpen)}
                  className="bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 w-full p-2.5 outline-none transition-all flex justify-between items-center text-left"
                >
                  <span className="truncate pr-2 font-medium">
                    {isAll ? placeholder : `เลือกแล้ว ${selected.length} รายการ`}
                  </span>
                  <LucideIcon name="ChevronDown" size={16} className={`text-slate-400 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                </button>

                {isOpen && (
                  <>
                    <div className="fixed inset-0 z-10" onClick={() => setIsOpen(false)}></div>
                    <div className="absolute z-20 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-xl max-h-60 overflow-y-auto">
                      <div className="p-2 border-b border-slate-100 sticky top-0 bg-white z-10">
                        <label className="flex items-center gap-3 cursor-pointer text-sm font-semibold text-blue-700 hover:bg-blue-50 p-2 rounded-md transition-colors">
                          <input type="checkbox" checked={isAll} onChange={() => onChange([])} className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                          เลือกทั้งหมด (All)
                        </label>
                      </div>
                      <div className="p-1">
                        {options.map(opt => (
                          <label key={opt} className="flex items-center gap-3 p-2 hover:bg-slate-50 cursor-pointer text-sm text-slate-700 rounded-md transition-colors">
                            <input type="checkbox" checked={selected.includes(opt)} onChange={() => toggleOption(opt)} className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                            {formatOption(opt)}
                          </label>
                        ))}
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          );
        };

        // --- Mock Initial Data ---
        const mockData = [
          { ชื่อเรื่อง: 'B082-2026-00020', REQUEST_DATE: '2026-01-15', ASSIGNED_DATE: '2026-01-16', DUE_DATE: '2026-01-25', COMPLETION_DATE: '2026-01-20', REQUESTER_DEPT: 'VGD/S', JOB_DESCRIPTION: 'ตู้เก็บสายฉีดน้ำดับเพลิง กระจกตู้แตก', JOB_STATUS: 'COMPLETED', JOB_TYPE: 'CM', PRIORITY: 'MEDIUM', Plan_Working_Day: '3' },
          { ชื่อเรื่อง: 'B082-2026-00167', REQUEST_DATE: '2026-04-02', ASSIGNED_DATE: '', DUE_DATE: '2026-04-01', COMPLETION_DATE: '', REQUESTER_DEPT: 'VCP/E', JOB_DESCRIPTION: 'เครื่องปรับอากาศห้อง server คอยล์เย็นรั่ว', JOB_STATUS: 'NEW', JOB_TYPE: 'CM', PRIORITY: 'HIGH', Plan_Working_Day: '2' },
          { ชื่อเรื่อง: 'B082-2026-00164', REQUEST_DATE: '2026-04-02', ASSIGNED_DATE: '2026-04-03', DUE_DATE: '2026-04-05', COMPLETION_DATE: '2026-04-06', REQUESTER_DEPT: 'VCP/W', JOB_DESCRIPTION: 'พบพื้น บริเวณประตูรับสินค้า ชำรุด', JOB_STATUS: 'COMPLETED', JOB_TYPE: 'CM', PRIORITY: 'MEDIUM', Plan_Working_Day: '5' },
          { ชื่อเรื่อง: 'B082-2026-00165', REQUEST_DATE: '2026-04-02', ASSIGNED_DATE: '2026-04-02', DUE_DATE: '2026-04-01', COMPLETION_DATE: '', REQUESTER_DEPT: 'VCP/W', JOB_DESCRIPTION: 'พบสนิมบริเวณหลังคา รบกวนซ่อมแซม', JOB_STATUS: 'IN PROGRESS', JOB_TYPE: 'PM', PRIORITY: 'LOW', Plan_Working_Day: '4' },
          { ชื่อเรื่อง: 'B082-2026-00050', REQUEST_DATE: '2026-02-10', ASSIGNED_DATE: '2026-02-10', DUE_DATE: '2026-02-11', COMPLETION_DATE: '2026-02-11', REQUESTER_DEPT: 'VGD/S', JOB_DESCRIPTION: 'เปลี่ยนหลอดไฟทางเดิน', JOB_STATUS: 'COMPLETED', JOB_TYPE: 'CM', PRIORITY: 'LOW', Plan_Working_Day: '1' },
          { ชื่อเรื่อง: 'B082-2026-00080', REQUEST_DATE: '2026-03-05', ASSIGNED_DATE: '2026-03-06', DUE_DATE: '2026-03-06', COMPLETION_DATE: '2026-03-07', REQUESTER_DEPT: 'VCP/E', JOB_DESCRIPTION: 'ตรวจเช็คระบบไฟประจำเดือน', JOB_STATUS: 'COMPLETED', JOB_TYPE: 'PM', PRIORITY: 'MEDIUM', Plan_Working_Day: '2' },
        ];

        function App() {
          const [data, setData] = useState(mockData);
          const [fileName, setFileName] = useState('ข้อมูลตัวอย่าง (Mock Data)');
          const [isXlsxLoaded, setIsXlsxLoaded] = useState(true); 
          const [errorMsg, setErrorMsg] = useState('');
          
          const [filterYears, setFilterYears] = useState([]);
          const [filterMonths, setFilterMonths] = useState([]);
          const [filterDays, setFilterDays] = useState([]);

          const handleFileUpload = (e) => {
            setErrorMsg('');
            const file = e.target.files[0];
            if (file) {
              if (!window.XLSX) {
                setErrorMsg('ระบบกำลังโหลดไลบรารีสำหรับอ่านไฟล์ Excel กรุณารอสักครู่แล้วลองใหม่ค่ะ');
                return;
              }
              setFileName(file.name);
              const reader = new FileReader();
              reader.onload = (event) => {
                try {
                  const fileData = new Uint8Array(event.target.result);
                  const workbook = window.XLSX.read(fileData, { type: 'array', cellDates: true });
                  const firstSheetName = workbook.SheetNames[0];
                  const worksheet = workbook.Sheets[firstSheetName];
                  const parsedData = window.XLSX.utils.sheet_to_json(worksheet, { raw: true, defval: '' });
                  
                  if (parsedData.length > 0) {
                    const cleanedData = parsedData.map(row => ({ 
                        ...row, 
                        REQUEST_DATE: parseDateValue(row.REQUEST_DATE || row['วันที่แจ้ง']),
                        ASSIGNED_DATE: parseDateValue(row.ASSIGNED_DATE || row['วันที่จ่ายงาน']),
                        DUE_DATE: parseDateValue(row.DUE_DATE || row['วันที่กำหนดเสร็จ']),
                        COMPLETION_DATE: parseDateValue(row.COMPLETION_DATE || row['วันที่แล้วเสร็จ'])
                    }));
                    setData(cleanedData);
                    setFilterYears([]); setFilterMonths([]); setFilterDays([]);
                  }
                } catch (error) {
                  console.error(error);
                  setErrorMsg('เกิดข้อผิดพลาดในการอ่านไฟล์ Excel ค่ะ กรุณาตรวจสอบรูปแบบไฟล์');
                }
              };
              reader.readAsArrayBuffer(file);
            }
          };

          const { years, months, days } = useMemo(() => {
            const ySet = new Set(), mSet = new Set(), dSet = new Set();
            data.forEach(item => {
              const dateStr = item.REQUEST_DATE;
              if (dateStr && dateStr.length >= 10) {
                const parts = dateStr.split('-');
                if (parts.length >= 3) {
                  ySet.add(parts[0]); mSet.add(parts[1]); dSet.add(parts[2].substring(0,2)); 
                }
              }
            });
            return { years: Array.from(ySet).sort(), months: Array.from(mSet).sort(), days: Array.from(dSet).sort() };
          }, [data]);

          const filteredData = useMemo(() => {
            return data.filter(item => {
              if (!item['ชื่อเรื่อง'] || String(item['ชื่อเรื่อง']).trim() === '') return false;
              const dateStr = item.REQUEST_DATE || '';
              if (!dateStr || dateStr.length < 10) {
                  return filterYears.length === 0 && filterMonths.length === 0 && filterDays.length === 0;
              }
              const parts = dateStr.split('-');
              const matchYear = filterYears.length === 0 || filterYears.includes(parts[0]);
              const matchMonth = filterMonths.length === 0 || filterMonths.includes(parts[1]);
              const matchDay = filterDays.length === 0 || filterDays.includes(parts[2].substring(0,2));
              return matchYear && matchMonth && matchDay;
            });
          }, [data, filterYears, filterMonths, filterDays]);

          const kpis = useMemo(() => {
            let total = 0, completed = 0, newJobs = 0, inProgress = 0;
            let totalActualDays = 0, jobsWithDays = 0;

            filteredData.forEach(item => {
              total++;
              const status = (item.JOB_STATUS || '').toUpperCase().trim();
              if (status === 'COMPLETED') {
                completed++;
                if (item.REQUEST_DATE && item.COMPLETION_DATE) {
                   const start = new Date(item.REQUEST_DATE);
                   const end = new Date(item.COMPLETION_DATE);
                   if (!isNaN(start) && !isNaN(end)) {
                       start.setHours(0, 0, 0, 0); end.setHours(0, 0, 0, 0);
                       const diffDays = (end - start) / 86400000;
                       if (diffDays >= 0 && diffDays <= 3650) {
                         totalActualDays += diffDays;
                         jobsWithDays++;
                       }
                   }
                }
              } else if (status.includes('NEW')) newJobs++;
              else inProgress++;
            });

            return { total, completed, newJobs, inProgress, avgWorkingDays: jobsWithDays > 0 ? (totalActualDays / jobsWithDays).toFixed(1) : 0 };
          }, [filteredData]);

          // --- SLA & Efficiency Calculations ---
          const efficiencyData = useMemo(() => {
            let onTimeCount = 0, lateCount = 0, slaTotal = 0;
            let totalAssignDelay = 0, assignCount = 0;
            let totalRepairTime = 0, repairCount = 0;
            let noSlaDataCount = 0; // เพิ่มตัวนับงานที่ทำเสร็จแต่ขาดข้อมูลวันที่
            
            // For Overdue calculation
            let activeOverdueCount = 0, activeOnTrackCount = 0, activeNoDueCount = 0, activeTotalWithDue = 0;
            const today = new Date();
            today.setHours(0,0,0,0);

            filteredData.forEach(item => {
              const status = (item.JOB_STATUS || '').toUpperCase().trim();
              
              if (status === 'COMPLETED') {
                // 1. SLA Compliance (Completion vs Due)
                if (item.COMPLETION_DATE && item.DUE_DATE) {
                  const comp = new Date(item.COMPLETION_DATE);
                  const due = new Date(item.DUE_DATE);
                  if (!isNaN(comp) && !isNaN(due)) {
                    comp.setHours(0,0,0,0); due.setHours(0,0,0,0);
                    if (comp <= due) onTimeCount++; else lateCount++;
                    slaTotal++;
                  } else {
                    noSlaDataCount++;
                  }
                } else {
                  noSlaDataCount++; // ถ้าระบุไม่ครบ ให้นับเป็นข้อมูลแหว่ง
                }

                // 2. Pending/Assign Time (Assigned vs Request)
                if (item.REQUEST_DATE && item.ASSIGNED_DATE) {
                  const req = new Date(item.REQUEST_DATE);
                  const ass = new Date(item.ASSIGNED_DATE);
                  if (!isNaN(req) && !isNaN(ass)) {
                    req.setHours(0,0,0,0); ass.setHours(0,0,0,0);
                    const diff = (ass - req) / 86400000;
                    if (diff >= 0 && diff < 3650) { totalAssignDelay += diff; assignCount++; }
                  }
                }
                // 3. Repair Time (Completion vs Assigned)
                if (item.ASSIGNED_DATE && item.COMPLETION_DATE) {
                  const ass = new Date(item.ASSIGNED_DATE);
                  const comp = new Date(item.COMPLETION_DATE);
                  if (!isNaN(ass) && !isNaN(comp)) {
                    ass.setHours(0,0,0,0); comp.setHours(0,0,0,0);
                    const diff = (comp - ass) / 86400000;
                    if (diff >= 0 && diff < 3650) { totalRepairTime += diff; repairCount++; }
                  }
                }
              } else if (status !== 'CANCELLED') {
                 // Active Jobs (Not completed & Not cancelled)
                 if (item.DUE_DATE) {
                     const due = new Date(item.DUE_DATE);
                     if (!isNaN(due.getTime())) {
                         due.setHours(0,0,0,0);
                         activeTotalWithDue++;
                         if (due < today) {
                             activeOverdueCount++;
                         } else {
                             activeOnTrackCount++;
                         }
                     } else {
                         activeNoDueCount++;
                     }
                 } else {
                     activeNoDueCount++;
                 }
              }
            });

            return {
              onTimeCount, lateCount, slaTotal, noSlaDataCount,
              onTimePct: slaTotal > 0 ? (onTimeCount / slaTotal) * 100 : 0,
              
              activeOverdueCount, activeOnTrackCount, activeNoDueCount, activeTotalWithDue,
              overduePct: activeTotalWithDue > 0 ? (activeOverdueCount / activeTotalWithDue) * 100 : 0,
              onTrackPct: activeTotalWithDue > 0 ? (activeOnTrackCount / activeTotalWithDue) * 100 : 0,

              avgAssignDays: assignCount > 0 ? (totalAssignDelay / assignCount).toFixed(1) : 0,
              avgRepairDays: repairCount > 0 ? (totalRepairTime / repairCount).toFixed(1) : 0,
              avgTotalLeadTime: assignCount > 0 && repairCount > 0 ? ((totalAssignDelay / assignCount) + (totalRepairTime / repairCount)).toFixed(1) : 0
            };
          }, [filteredData]);

          // --- Dynamic Pie Chart Calculation ---
          const dynamicPieStatusData = useMemo(() => {
            const counts = {};
            filteredData.forEach(item => {
              let status = item.JOB_STATUS ? String(item.JOB_STATUS).toUpperCase().trim() : 'UNKNOWN';
              if (status === '') status = 'UNKNOWN';
              counts[status] = (counts[status] || 0) + 1;
            });

            const total = Object.values(counts).reduce((sum, val) => sum + val, 0);
            const sorted = Object.entries(counts)
              .map(([name, count]) => ({ name, count, pct: total > 0 ? (count / total) * 100 : 0 }))
              .sort((a, b) => b.count - a.count);

            const colorMap = { 'COMPLETED': '#10b981', 'NEW': '#f43f5e', 'IN PROGRESS': '#f59e0b', 'ASSIGNED': '#3b82f6', 'PENDING': '#8b5cf6', 'WAITING': '#ec4899', 'CANCELLED': '#64748b' };
            const fallbackColors = ['#0ea5e9', '#d946ef', '#14b8a6', '#f97316', '#84cc16', '#6366f1', '#eab308'];
            let fallbackIdx = 0; let accumulatedOffset = 100;

            return {
              total,
              items: sorted.map(item => {
                let color = colorMap[item.name] || colorMap[Object.keys(colorMap).find(k => item.name.includes(k))];
                if (!color) { color = fallbackColors[fallbackIdx % fallbackColors.length]; fallbackIdx++; }
                const offset = accumulatedOffset; accumulatedOffset -= item.pct;
                return { ...item, color, offset };
              })
            };
          }, [filteredData]);

          const deptData = useMemo(() => {
            const counts = {};
            filteredData.forEach(item => {
              const dept = item.REQUESTER_DEPT || 'Unknown';
              counts[dept] = (counts[dept] || 0) + 1;
            });
            return Object.entries(counts).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count).slice(0, 5);
          }, [filteredData]);

          const maxDeptCount = deptData.length > 0 ? Math.max(...deptData.map(d => d.count)) : 1;

          // --- Cumulative Monthly Data ---
          const cumulativeMonthlyData = useMemo(() => {
            const grouped = {};
            filteredData.forEach(item => {
              const dateStr = item.REQUEST_DATE;
              if (!dateStr || dateStr.length < 7) return;
              const monthKey = dateStr.substring(0, 7); // YYYY-MM
              if (!grouped[monthKey]) grouped[monthKey] = { month: monthKey, COMPLETED: 0, NEW: 0, 'IN PROGRESS': 0, OTHER: 0 };

              const status = (item.JOB_STATUS || '').toUpperCase().trim();
              if (status === 'COMPLETED') grouped[monthKey].COMPLETED++;
              else if (status.includes('NEW')) grouped[monthKey].NEW++;
              else if (status.includes('IN PROGRESS') || status.includes('ASSIGNED')) grouped[monthKey]['IN PROGRESS']++; 
              else grouped[monthKey].OTHER++;
            });

            const sortedMonths = Object.values(grouped).sort((a, b) => a.month.localeCompare(b.month));

            let accComp = 0;
            let accNew = 0;
            let accProg = 0;
            let accOther = 0;

            return sortedMonths.map(d => {
              accComp += d.COMPLETED;
              accNew += d.NEW;
              accProg += d['IN PROGRESS'];
              accOther += d.OTHER;
              const total = accComp + accNew + accProg + accOther;
              return {
                month: d.month,
                accComp,
                accNew,
                accProg,
                accOther,
                total,
                pctComp: total > 0 ? (accComp / total) * 100 : 0,
                pctNew: total > 0 ? (accNew / total) * 100 : 0,
                pctProg: total > 0 ? (accProg / total) * 100 : 0,
                pctOther: total > 0 ? (accOther / total) * 100 : 0,
              };
            });
          }, [filteredData]);

          const maxCumY = cumulativeMonthlyData.length > 0 
            ? cumulativeMonthlyData[cumulativeMonthlyData.length - 1].total 
            : 1;

          // SVG Stacked Chart constants
          const tW = 800; 
          const tH = 280;
          const pX = 40;
          const pY = 30;
          const pB = 40; 
          const iW = tW - pX * 2;

                                 </text>

                            );

                         {/* X-axis labels (Months) */}
                         {cumulativeMonthlyData.map((d, idx) => {
                            const xCenter = pX + (idx + 0.5) * (iW / cumulativeMonthlyData.length);
                            const [yy, mm] = d.month.split('-');
                            const monthNames = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

                            return (
                              <text key={idx} x={xCenter} y={tH + 15} textAnchor="middle" fill="#64748b" fontSize="11" fontWeight="600">

                             const xCenter = pX + (idx + 0.5) * (iW / cumulativeMonthlyData.length);
                             const xStart = xCenter - barWidth / 2;

                             const hComp = (d.accComp / maxCumY) * iH;
                             const hProg = (d.accProg / maxCumY) * iH;
                             const hNew = (d.accNew / maxCumY) * iH;
                             const hOther = (d.accOther / maxCumY) * iH;

                             const yComp = pY + iH - hComp;
                             const yProg = yComp - hProg;
                             const yNew = yProg - hNew;
                             const yOther = yNew - hOther;

                             return (
                               <g key={idx} className="transition-all hover:opacity-90 cursor-pointer">
                                 {/* Completed (Bottom) */}
                                 {hComp > 0 && (
                                   <g>
                                     <rect x={xStart} y={yComp} width={barWidth} height={hComp} fill="#10b981" rx={hProg===0 && hNew===0 && hOther===0 ? "3" : "0"}>
                                       <title>{d.month}: Completed ({d.accComp} งาน - {d.pctComp.toFixed(1)}%)</title>
                                     </rect>
                                     {hComp > 20 && (
                                       <text x={xCenter} y={yComp + hComp/2 + 4} textAnchor="middle" fill="#fff" fontSize="10" fontWeight="bold">
                                         {d.pctComp.toFixed(0)}%
                                       </text>
                                     )}
                                   </g>
                                 )}
                                 {/* In Progress (Middle) */}
                                 {hProg > 0 && (
                                   <g>
                                     <rect x={xStart} y={yProg} width={barWidth} height={hProg} fill="#f59e0b" rx={hNew===0 && hOther===0 ? "3" : "0"}>
                                       <title>{d.month}: In Progress ({d.accProg} งาน - {d.pctProg.toFixed(1)}%)</title>
                                     </rect>
                                     {hProg > 20 && (
                                       <text x={xCenter} y={yProg + hProg/2 + 4} textAnchor="middle" fill="#fff" fontSize="10" fontWeight="bold">
                                         {d.pctProg.toFixed(0)}%
                                       </text>
                                     )}
                                   </g>
                                 )}
                                 {/* New (Top) */}
                                 {hNew > 0 && (
                                   <g>
                                     <rect x={xStart} y={yNew} width={barWidth} height={hNew} fill="#f43f5e" rx={hOther===0 ? "3" : "0"}>
                                       <title>{d.month}: New ({d.accNew} งาน - {d.pctNew.toFixed(1)}%)</title>
                                     </rect>
                                     {hNew > 20 && (
                                       <text x={xCenter} y={yNew + hNew/2 + 4} textAnchor="middle" fill="#fff" fontSize="10" fontWeight="bold">
                                         {d.pctNew.toFixed(0)}%
                                       </text>
                                     )}
                                   </g>
                                 )}
                                 {/* Other (Very Top) */}
                                 {hOther > 0 && (
                                   <g>
                                     <rect x={xStart} y={yOther} width={barWidth} height={hOther} fill="#94a3b8" rx="3">
                                       <title>{d.month}: Other ({d.accOther} งาน - {d.pctOther.toFixed(1)}%)</title>
                                     </rect>
                                     {hOther > 20 && (
                                       <text x={xCenter} y={yOther + hOther/2 + 4} textAnchor="middle" fill="#fff" fontSize="10" fontWeight="bold">
                                         {d.pctOther.toFixed(0)}%
                                       </text>
                                     )}
                                   </g>
                                 )}
                                 
                                 {/* Total Number Label on Top */}
                                 <text x={xCenter} y={yOther - 6} textAnchor="middle" fill="#475569" fontSize="12" fontWeight="bold">
                                   {d.total}
                                 </text>
                               </g>
                             )
                         })}
                      </svg>
                    ) : (
                      <div className="flex items-center justify-center h-full text-slate-400">ไม่พบข้อมูลสำหรับสร้างกราฟ</div>
                    )}
                  </div>

                  {/* Legend */}
                  <div className="flex justify-center flex-wrap gap-5 mt-4 text-xs font-bold">
                     <div className="flex items-center gap-1.5 text-slate-500"><div className="w-3 h-3 rounded-sm bg-slate-400 shadow-sm"></div>OTHER (อื่นๆ)</div>
                     <div className="flex items-center gap-1.5 text-rose-600"><div className="w-3 h-3 rounded-sm bg-rose-500 shadow-sm"></div>NEW (งานใหม่)</div>
                     <div className="flex items-center gap-1.5 text-amber-600"><div className="w-3 h-3 rounded-sm bg-amber-500 shadow-sm"></div>IN PROGRESS (กำลังทำ/รอ)</div>
                     <div className="flex items-center gap-1.5 text-emerald-600"><div className="w-3 h-3 rounded-sm bg-emerald-500 shadow-sm"></div>COMPLETED (เสร็จสิ้น)</div>
                  </div>
                </div>

                {/* Data Table */}
                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                  <div className="flex items-center justify-between mb-6">
                    <h3 className="text-lg font-bold text-slate-800">รายการงานซ่อมบำรุงล่าสุด</h3>
                    <span className="text-sm text-slate-500">แสดงผล {filteredData.slice(0, 10).length} จาก {filteredData.length} รายการ</span>
                  </div>
                  
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                          <th className="p-4 rounded-tl-lg font-semibold">เลขที่งาน (Job ID)</th>
                          <th className="p-4 font-semibold">วันที่แจ้ง (Date)</th>
                          <th className="p-4 font-semibold">แผนก (Dept)</th>
                          <th className="p-4 font-semibold w-1/3">รายละเอียด (Description)</th>
                          <th className="p-4 font-semibold text-center">ประเภท</th>
                          <th className="p-4 rounded-tr-lg font-semibold text-center">สถานะ (Status)</th>
                        </tr>
                      </thead>
                      <tbody className="text-sm divide-y divide-slate-100">
                        {filteredData.slice(0, 10).map((item, idx) => (
                          <tr key={idx} className="hover:bg-slate-50/80 transition-colors">
                            <td className="p-4 font-medium text-slate-800">{item['ชื่อเรื่อง'] || item.Job_ID || '-'}</td>
                            <td className="p-4 text-slate-600">{item.REQUEST_DATE || '-'}</td>
                            <td className="p-4"><span className="px-2.5 py-1 bg-slate-100 text-slate-700 rounded-md text-xs font-medium">{item.REQUESTER_DEPT || '-'}</span></td>
                            <td className="p-4 text-slate-600 truncate max-w-xs" title={item.JOB_DESCRIPTION}>{item.JOB_DESCRIPTION || '-'}</td>
                            <td className="p-4 text-center"><span className="text-xs font-bold text-slate-500">{item.JOB_TYPE || '-'}</span></td>
                            <td className="p-4 text-center">
                              {(() => {
                                const status = (item.JOB_STATUS || '').toUpperCase();
                                if (status.includes('COMPLETED')) return <span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">Completed</span>;
                                if (status.includes('NEW')) return <span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-rose-100 text-rose-800">New</span>;
                                return <span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-amber-100 text-amber-800">{status || 'Pending'}</span>;
                              })()}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
